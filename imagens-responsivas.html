<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens Responsivas</title>
</head>
<body>
    <h1>Usando o elemento picture</h1>
    <p><code>picture</code> é uma tag que permite servir imagens de diferentes tamanhos conforme o tipo/tamanho de mídia (tela) que o usuário utiliza.</p>

    <h2>Usando min-width (da imagem grande para a menor)</h2>

    <picture>
        <!-- Telas a partir de 600px (>=), carregam ideias.jpg (grande) -->
        <source media="(min-width: 600px)" srcset="imagens/ideias.jpg">

        <!-- Telas a partir de 400px (>=), carregam ideias-media.jpg -->
        <source media="(min-width: 400px)" srcset="imagens/ideias-media.jpg">

        <!-- Se não for nenhuma das condições anteriores, carrega ideias-pequena -->
        <img srcset="imagens/ideias-pequena.jpg" alt="">
    </picture>

    <h2>Usando max-width (da imagem pequena para a maior)</h2>

    <picture>
        <source media="(max-width: 400px)" srcset="imagens/ideias-pequena.jpg">
        <source media="(max-width: 600px)" srcset="imagens/ideias-media.jpg">
        <img src="imagens/ideias.jpg" alt="">
    </picture>
</body>
</html>
