<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletores modernos</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --cor-borda: grey;
            --cor-destaque: rgb(60, 104, 112);
        }

        body {
            font-family: sans-serif;
            padding: 2rem;
            background-color: rgb(201, 240, 237);
        }

        article {
            background-color: rgb(255, 255, 255);
            border: solid 2px var(--cor-borda);
            border-radius: 12px;
            padding: 1.5rem;
            max-width: 400px;
            margin-inline: auto;
            margin-block: 2rem;
        }

        img {
            max-width: 100%;
        }

        a {
            text-decoration: none;
            background-color: var(--cor-destaque);
            color: white;
            padding: 0.5rem;
        }

        /* Agrupamos dentro do contexto do article usando pseudo-classe :is() e formatamos os elementos ali contidos. */
        article :is(h2, p, span) {
            color: rgb(194, 43, 43);
        }

        /* Usamos o :has() para, através de uma condição baseada no filho, conseguir formatar o pai. */
        article:has(img) {
            border-color: rgb(34, 34, 198);
            background-color: rgb(242, 230, 194);
        }

        /* Aplica sombra no article desde que passe o mouse no link dentro dele. */
        article:has(a:hover) {
            box-shadow: black 0 0 10px;
        }
    </style>
</head>

<body>
    <h1>Usando seletores <code>:is</code> e <code>:has</code></h1>
    <article>
        <h2>Exemplo 1: artigo com texto</h2>
        <p>Aqui temos um texto qualquer</p>
        <span>Aqui outro texto...</span>
    </article>

    <article>
        <img src="imagens/front-end.jpg" alt="">
        <h2>Exemplo 2: artigo com imagem</h2>
        <p>Aqui temos imagem e texto...</p>
    </article>

    <article>
        <h2>Exemplo 3: texto com link</h2>
        <p>Texto qualquer...</p>
        <a href="">Link qualquer</a>
    </article>

    <hr>

    <h2>Outro titulo...</h2>
    <p>Outro texto...</p>
    <span>Outro texto do span...</span>
</body>

</html>
