<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício - Flexbox</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body,
        h1,
        h2,
        p {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: black;
            background-color: rgb(193, 219, 236);
        }

        nav {
            background-color: white;
            border-block-end: solid 1px;
            min-height: 80px;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 30px;
            flex-direction: row;
            font-size: 20px;
            border-radius: 10px;
            padding: 20px;

            a {
                text-decoration: none;
                color: black;
                font-weight: bold;

                &:hover,
                &:focus {
                    color: rgb(39, 77, 199);
                }
            }
        }

        .hero {
            background-color: rgb(193, 219, 236);
            padding: 20px;
            text-align: center;
            font-size: 25px;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-end;
            margin-block-end: 2rem;
            height: 500px;
            align-items: flex-start;
            gap: 2rem;
            height: auto;
        }

        .card {
            background-color: white;
            padding: 1rem;
            margin: 64px;
            box-shadow: rgba(0, 0, 0, 0.733) 0 10px 10px;
            text-align: center;
            width: 250px;
            height: 180px;
            min-height: 100px;
            font-size: 20px;
            border-radius: 10px;

        }
    </style>
</head>

<body>

    <section class="hero">
        <h1>Exercício - Flexbox</h1>
    </section>
    <nav>
        <a href="Início">Início</a>
        <a href="Notícias">Notícias</a>
        <a href="Cursos">Cursos</a>
        <a href="Contato">Contato</a>
    </nav>

    <main class="cards">
        <article class="card">
            <h2>Nova IA no mercado</h2>
            <p>Tecnologia promete revolucionar o setor.</p>
        </article>

        <article class="card">
            <h2>CSS moderno</h2>
            <p>Novos recursos chegam aos navegadores.</p>
        </article>

        <article class="card">
            <h2>JavaScript 2026</h2>
            <p>Atualização e melhores práticas.</p>
        </article>

        <article class="card">
            <h2>Frameworks em alta</h2>
            <p>Quais tecnologias dominarão o mercado.</p>
        </article>
    </main>
</body>

</html>
