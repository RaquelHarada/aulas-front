<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animações</title>
    <style>
        /* Alterrando o Box Model( padding, height, border) */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        /*  Regra de reset parcial */
        body,
        h1,
        h2,
        p {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: #222;
            background-color: #f5f5f5;
            animation-name: mudarCorFundo;
            animation-duration: 10s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        nav {
            background-color: white;
            border-block-end: solid 1px;
            min-height: 80px;
            position: sticky;
            top: 0;
            /* Habilitando o modo flex */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            /*  Sobre direção e eixos do flexbox. a direção padrão é flex-direction: row. nesse caso, justify-content alinha os elementos no eixo main( horizontal), e o aling-itens os elementos no eixo main (horizontal), e o align-itens alinha os elementos no eixo cross(vertical) 
        
        Se mudar a direção para a column( coluna), essa logica também é invertida: justify-content alinhará os elementos verticalmente, e o align-itens alinhará os elementos horizontalmente
        */
            flex-direction: row;
            /*  CSS Nesting */

        }

        nav a {
            text-decoration: none;
            color: #222;
            font-weight: bold;
            /* Definimos o elemento a como contexto de posicionamento do pseudo-elemento after.
            Ele srve com uma âncora! */
            position: relative;
        }

        nav a:hover,
        nav a:focus {
            color: darkblue;
        }


        /* tag after significa itens antes do conteúdo */
        nav a::after {
            content: "";
            background-color: rgb(180, 77, 77);
            width: 0;
            height: 4px;
            position: absolute;
            /* Coordenadas (left, top, right, bottom) */
            bottom: -4px;
            left: 0;

            transition: 1s;
            /* Transição suave, animada da largura */

        }

        /* Ao passar o mouse no link do nav, modificar a largura do pseudo-elemento*/
        nav a:hover::after,
        nav a:focus::after {
            width: 100%;
        }



        .hero {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;

            a {
                text-decoration: none;
                background-color: #16a34a;
                color: rgb(22, 22, 22);
                padding: 0.5rem;
                border-radius: 8px;

                &:hover,
                &:focus {
                    background-color: #0f5c2c;
                }
            }

        }

        .banner {
            background-color: rgb(236, 215, 24);
            text-align: center;
            padding: 1.2rem;
            font-weight: bold;
            margin-block: 1rem;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-block-end: 2rem;
            height: 700px;
            /* Alinha os itens de maneira agrupada( precisa ter espaço suficiente pra isso) */
            align-items: flex-start;
            /* "Quebra o Layout. se naão houver espaço suficiente, os elementos irão para baixo" */
            flex-wrap: wrap;
            align-content: flex-start;

        }

        .card {
            width: 250px;
            min-height: 200px;
            padding: 1rem;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.594) 0 0 10px;
            animation-name: aparecer;
            animation-duration: 5s;
            animation-fill-mode: backwards;
        }


        #cardcss {
            animation-delay: 1s;
        }
        #cardj {
            animation-delay: 1s;
        }

        /* Regras de Animação: utilizam uma diretiva especial chamada @keyframes contendo um nome e seletores de animação. */

        @keyframes mudarCorFundo {


            /* Dê/inicio/Começo */
            from {
                background-color: rgb(236, 189, 189);
            }

            /* Para/Fim/Término */
            to {
                background-color: rgb(180, 77, 77);
            }

            /* 0% {
                    background-color: rgb(153, 240, 232);
                }
                25% {
                    background-color: rgb(55, 95, 148);
                } */
            /* 50% {
                    background-color: rgb(58, 60, 161);
                } */
        }

        h1 {
            animation-name: subir;
            animation-duration: 2s;
        }

        .hero p {
            animation-name: subir;
            animation-duration: 2s;
            animation-delay: 3s;


            /* Ele aplica os estilos do primeiro keyframe antes da animação começar, durante o tempo de animation-delay. Se você tiver um delay, o elemento fica com o estilo "normal" até a animação começar. */
            animation-fill-mode: backwards;
        }


        @keyframes subir {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .banner {
            animation-name: deslizar;
            animation-duration: 1s;
            animation-iteration-count: infinite;
        }

        @keyframes deslizar {
            from {
                opacity: -0;
                transform: translateX(-1000px);
            }

            to {
                opacity: 1;
                transform: translateX(0px);
            }
        }


        @keyframes aparecer {
            from {
                opacity: 0;
                transform: scale(0%);
            }

            to {
                opacity: 1;
                transform: scale(100%);
            }
        }
    </style>
</head>

<body>
    <nav>
        <a href="">início</a>
        <a href="">cursos</a>
        <a href="">contato</a>
    </nav>
    <!-- seção/chamada de destaque, normalmente conhecida como "HERO" contendo uma CTA ( Call To Action)-->
    <section class="hero">
        <h1>Aprenda Css do Zero</h1>
        <P>Layouts Modernos com flexbox</P>
        <p><a href="Matricule-se ja!">"Matricule-se ja!"</a></p>
    </section>

    <!-- Banner publicitário -->
    <div class="banner">
        Promoção: 50% Off Hoje!
    </div>

    <!-- Cards ( Cartões ) de conteúdo -->

    <main class="cards">
        <article class="card">
            <h2>HTML</h2>
            <p>Estrutura das paginas</p>
        </article>

        <article class="card" id="cardcss">
            <h2>Css</h2>
            <p>Estilo, Layout e animação</p>
        </article>

        <article class="card" id="cardj">
            <h2>j5</h2>
            <p>Comportamento e interatividade</p>

        </article>

    </main>
</body>

</html>
