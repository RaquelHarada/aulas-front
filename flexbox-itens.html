<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox itens</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: black;
            background-color: #f7daf2;
            padding: 1rem;
        }

        h1 {
            font-size: 1.2rem;
            margin-block-end: 0.8rem;
        }

        /* flex-wrap significa se os itens vão quebrar linha */
        .container {
            background-color: rgb(255, 255, 255);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            margin-block: 10px;
        }

        /* Flex Items */
        .item {
            background-color: rgb(225, 219, 247);
            padding: 20px;
            text-align: center;


            /* Tamanho ideal para o flex */
            flex-basis: 10px;

            /* Definindo se o item cresce, conforme o espaço disponível */
            flex-grow: 1;

            /* Definindo se o item encolhe em uma proporção maior*/
            flex-shrink: 0;

            /* Forma abreviada para flex-grow, flex-shrink e flex-basis */
            /* flex: 1 1 150px; */

            /* flex- direction: row
            flex-wrap: nowrap;
            
            o flex-flow: row nowrap é a junção das duas propriedades */
        }

    /* flex-grow define o quanto o item cresce */
        .d {
            background-color: rgb(154, 101, 204);
            flex-grow: 3;
        }

        /* flex-shrink define o quanto o item pode encolher */
        .e {
            background-color: rgb(115, 107, 167);
            flex-shrink: 2;
        }

        /* Usar ambos define o comportamento do item */
        .f {
            background-color: rgb(91, 76, 179);
            flex-grow: 0;
            flex-shrink: 0;
        }

        /* Order significa a ordem de exibição dos itens */
        .g {
            background-color: rgb(131, 52, 65);
            order: 3;
        }

        .h {
            background-color: rgb(92, 54, 92);
            order: 1;
            align-self: center;
        }

        /* align-self define o alinhamento do item dentro do container */
        .i {
            background-color: rgb(85, 43, 57);
            order: 2;
            align-self: flex-end;
        }

        /* align-items define o alinhamento dos itens dentro do container */
        .alinhamentos {
            height: 300px;
            align-items: flex-start;
        }
    </style>
</head>

<body>
    <h1>Conhecedo e experimentando propriedades flex para os itens de um container.</h1>

    <div class="container">
        <div class="item a">Item A</div>
        <div class="item b">Item B</div>
        <div class="item c">Item C</div>
    </div>

    <div class="container">
        <div class="item d">Item D</div>
        <div class="item e">Item E</div>
        <div class="item f">Item F</div>
    </div>

    <div class="container alinhamentos">
        <div class="item g">Item G</div>
        <div class="item h">Item H</div>
        <div class="item i">Item I</div>
    </div>

</body>

</html>
