<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos multimidia</title>
</head>
<body>
    <h1>Trabalhando com elementos multimidia</h1>
    <hr>
    <h2>Áudio</h2>

    <!-- Atributos booleanos ()
     controls, muted, autoplay e loop -->
    <audio controls muted autoplay>
        <source src="multimidia/judas-priest.mp3" type="audio/mp3">
        <source src="multimidia/judas-priest.ogg" type="audio/ogg">
    </audio>

    <hr>

    <h2>Vídeo</h2>
    <video controls>
        <source src="multimidia/pink-floyd.mp4" type="video/mp4">
        <source src="multimidia/pink-floyd.webm" type="video/webm">
        <track src="multimidia/legenda.vtt" kind="subtitles" srclang="en">
    </video>


</body>
</html>
