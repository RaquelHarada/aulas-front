<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre o uso de títulos</title>
</head>
<body>
    <!--COMENTÁRIO/ANOTAÇÃO de HTML (atalho CTRL;)-->

    <!-- A utilização de tags de título (heading)
     segue uma lógica de hierarquia. Exemplo: para ter uma <h3>, necessariamente devemos ter antes um <h2> e um <h1>.
    Obs.: vai de <h1> até <h6>. -->
     
    
    <h1>Raquel Harada Martins</h1>

        <h2>Dados Pessoais</h2>

        <h2>Experiências</h2>

            <h3>Empresa A</h3>

            <h3>Empresa B</h3>

        <h2>Formação</h2>

            <h3>Escola X</h3>

            <h3>Escola Y</h3>

        <h2>informações Adicionais</h2>


 
</body>
</html>
